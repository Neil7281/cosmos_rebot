# cosmos-framework Vision SFT config for manavgoel4/molmo_act2_motor_box
# Schema: cosmos_framework/configs/toml_config/sft_config.py
#
# This is Vision SFT — it teaches Cosmos 3 Nano the reBot's world dynamics
# (what the motor-box task looks like as video).
# At inference you then call with action_mode=policy or inverse_dynamics
# to get joint angle predictions.

[job]
task       = "vfm"       # vision-foundation-model (generator) SFT
wandb_mode = "disabled"  # change to "online" + export WANDB_API_KEY to log

[checkpoint]
load_path     = "${oc.env:BASE_CHECKPOINT_PATH}"
save_dir      = "outputs/rebot_motor_box_nano"
save_interval = 500

[model]
  [model.tokenizer]
  vae_path = "${oc.env:WAN_VAE_PATH}"

[data]
# $DATASET_PATH/train/video_dataset_file.jsonl  (built by 01_prepare_dataset.py)
dataset_path = "${oc.env:DATASET_PATH}"
num_workers  = 4

  [data.video]
  height     = 480
  width      = 640
  fps        = 10
  # 3-second windows (30 frames) — keeps VRAM bounded per sample
  num_frames = 30

[training]
# ── Parallelism ────────────────────────────────────────────────────────────────
# -1 = auto-detect from torchrun world size.
# 2 × A100 80 GB is the tested minimum.
data_parallel_shard_degree     = -1
data_parallel_replicate_degree = 1
context_parallel_shard_degree  = 1
distributed_parallelism        = "fsdp"

# ── Batch ─────────────────────────────────────────────────────────────────────
# 1 micro-batch per rank × 8 accumulation steps × N_GPUS = effective batch.
# At 30 frames × 480×640 in bfloat16 each sample is ~43 MB GPU.
batch_size      = 1
grad_accum_iter = 8

# ── Duration ──────────────────────────────────────────────────────────────────
# 50 episodes → ~200 clips (each ~30-frame window).
# 5 000 steps ≈ 25 epochs on 2 GPUs.
# Bump to 10 000 if you have 4+ GPUs and want more polish.
max_iterations = 5000
logging_iter   = 50

# ── Precision ─────────────────────────────────────────────────────────────────
dtype = "bfloat16"

[optimizer]
lr           = 1e-4
weight_decay = 1e-2
beta1        = 0.9
beta2        = 0.95

[scheduler]
cycle_lengths      = [5000]
warm_up_steps      = [200]
f_max              = 1.0
f_min              = 0.1
f_start            = 0.0
verbosity_interval = 200
